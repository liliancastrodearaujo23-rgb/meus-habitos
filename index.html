<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rotina da Lili</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family: 'Inter', sans-serif;
}

.title{
  font-family: 'Playfair Display', serif;
}

/* 🎉 CONFETE */
.confetti{
  position: fixed;
  width: 8px;
  height: 8px;
  background: pink;
  top: -10px;
  animation: fall 1.5s linear forwards;
  z-index: 999;
}

@keyframes fall{
  to{
    transform: translateY(100vh) rotate(360deg);
    opacity: 0;
  }
}

/* 🔹 NOVO: menu lateral */
.sidebar{
  position: fixed;
  left: 0;
  top: 0;
  height: 100%;
  width: 80px;
  background: white;
  border-right: 1px solid #eee;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:20px;
}

/* 🔹 NOVO: calendário */
.day{
  width:32px;
  height:32px;
  border-radius:6px;
  background:#e5e7eb;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.day:hover{
  background:#9ca3af;
}
</style>
</head>

<body class="bg-gradient-to-br from-gray-100 via-gray-200 to-gray-100 min-h-screen p-3 pl-24">

<!-- 🔹 MENU LATERAL -->
<div class="sidebar">
  <button onclick="showScreen('home')">Início</button>
  <button onclick="showScreen('charts')">Gráficos</button>
</div>

<div id="homeScreen" class="bg-white w-full max-w-md mx-auto rounded-[30px] shadow-xl p-5">

<div class="text-center mb-4">
  <p id="date" class="text-sm text-gray-400"></p>

  <h1 class="title text-3xl text-gray-800">
    Rotina da Lili 🌷
  </h1>

  <div id="messageBox" class="mt-3 p-3 rounded-2xl text-sm font-medium">
    <span id="message">Que hábito você vai praticar hoje?</span>
  </div>

  <p class="mt-2 text-sm text-gray-600">
    <span id="progress">0</span>/<span id="total">0</span>
  </p>

  <div class="mt-3">
    <div class="w-full bg-gray-200 rounded-full h-3 overflow-hidden">
      <div id="progressBar" class="h-3 rounded-full transition-all duration-500"></div>
    </div>
    <p id="progressText" class="text-xs text-gray-400 mt-1 text-center"></p>
  </div>
</div>

<div id="tasks" class="space-y-3 mb-6"></div>

</div>

<!-- 🔹 NOVO: tela gráficos -->
<div id="chartsScreen" class="hidden max-w-md mx-auto bg-white p-5 rounded-3xl shadow-xl">
  <div id="calendar" class="grid grid-cols-7 gap-2 mb-4"></div>
  <div id="report" class="text-sm text-gray-600"></div>
</div>

<script>
let tasksList = [
  {name:"Devocional", icon:"📖", type:"time"},
  {name:"Inglês", icon:"📚", type:"time"},
  {name:"Yoga", icon:"🧘‍♀️", type:"time"},
  {name:"Jump", icon:"🏃‍♀️", type:"time"},
  {name:"Sem doce", icon:"🍫", type:"check"},
  {name:"Sem gastos", icon:"💸", type:"check"}
];

let data = JSON.parse(localStorage.getItem("habits")) || {};
let selectedDate = new Date().toISOString().slice(0,10);

/* 🔹 NOVO: troca de telas */
function showScreen(screen){
  document.getElementById("homeScreen").classList.add("hidden");
  document.getElementById("chartsScreen").classList.add("hidden");

  if(screen==="home"){
    document.getElementById("homeScreen").classList.remove("hidden");
  }else{
    document.getElementById("chartsScreen").classList.remove("hidden");
    renderCalendar();
    renderReport();
  }
}

// 🎯 RENDER
function render(){
  const container = document.getElementById("tasks");
  container.innerHTML="";

  let doneCount=0;

  tasksList.forEach(task=>{
    const entry = data[selectedDate]?.[task.name];
    const isDone = task.type==="check" ? entry === true : entry?.done;

    if(isDone) doneCount++;

    const div=document.createElement("div");
    div.className="p-4 rounded-3xl shadow-sm bg-gray-50";

    // 🔹 ALTERAÇÃO: tarefas com tempo
    if(task.type==="time"){
      div.innerHTML=`
      <div class="flex justify-between items-center">
        <span>${task.icon} ${task.name}</span>
        <div class="flex gap-1">
          ${[10,15,30].map(t=>`
            <button onclick="setTime('${task.name}',${t})"
            class="px-2 py-1 bg-gray-200 rounded text-xs">
            ${t}m
            </button>
          `).join("")}
        </div>
      </div>`;
    }else{
      div.innerHTML=`
      <div class="flex justify-between items-center">
        <span>${task.icon} ${task.name}</span>
        <button onclick="toggleTask('${task.name}','${task.type}')"
          class="w-10 h-10 rounded-full ${isDone?'bg-gray-800 text-white':'bg-gray-200'}">
          ${isDone?'✔':''}
        </button>
      </div>`;
    }

    container.appendChild(div);
  });

  document.getElementById("progress").innerText=doneCount;
  document.getElementById("total").innerText=tasksList.length;

  updateProgress(doneCount);
  updateMessage(doneCount);
}

// 🔹 NOVO: salvar tempo
function setTime(task,minutes){
  if(!data[selectedDate]) data[selectedDate]={};
  data[selectedDate][task]={done:true,time:minutes};
  localStorage.setItem("habits", JSON.stringify(data));
  render();
}

// 🔹 NOVO: calendário
function renderCalendar(){
  const cal=document.getElementById("calendar");
  cal.innerHTML="";

  const now=new Date();
  const days=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();

  for(let d=1;d<=days;d++){
    const date=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const el=document.createElement("div");
    el.className="day";
    el.innerText=d;

    let count=Object.values(data[date]||{}).filter(v=>v?.done||v===true).length;

    if(count===1) el.style.background="#facc15";
    if(count===3) el.style.background="#60a5fa";
    if(count>=tasksList.length) el.style.background="#34d399";

    cal.appendChild(el);
  }
}

// 🔹 NOVO: relatório
function renderReport(){
  let total=0;
  let perTask={};

  Object.values(data).forEach(day=>{
    Object.entries(day).forEach(([task,val])=>{
      if(val?.time){
        total+=val.time;
        perTask[task]=(perTask[task]||0)+val.time;
      }
    });
  });

  const div=document.getElementById("report");

  div.innerHTML=`
    <p>Total: ${formatTime(total)}</p>
    ${Object.entries(perTask).map(([t,v])=>`<p>${t}: ${formatTime(v)}</p>`).join("")}
  `;
}

// 🔹 NOVO: formatação
function formatTime(min){
  let h=Math.floor(min/60);
  let d=Math.floor(h/24);
  h=h%24;
  let m=min%60;
  return `${d}d ${h}h ${m}m`;
}

// 🔁 TOGGLE (inalterado)
function toggleTask(task,type){
  if(!data[selectedDate]) data[selectedDate]={};

  if(type==="check"){
    data[selectedDate][task] = !data[selectedDate][task];
  }else{
    if(!data[selectedDate][task]) data[selectedDate][task]={};
    data[selectedDate][task].done = !data[selectedDate][task].done;
  }

  localStorage.setItem("habits", JSON.stringify(data));
  render();
}

render();
</script>

</body>
</html>
