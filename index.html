<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rotina da Lili</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{box-sizing:border-box}
</style>
</head>

<body class="bg-gradient-to-br from-pink-100 via-rose-100 to-pink-200 min-h-screen p-3">

<div class="bg-white w-full max-w-md mx-auto rounded-3xl shadow-xl p-5">

<div class="text-center mb-4">
  <p id="date" class="text-sm text-gray-400"></p>
  <h1 class="text-3xl text-pink-500">Rotina da Lili 🌷</h1>
  <p class="text-gray-500 text-sm">Você não vai se arrepender 💫</p>
  <p class="mt-2 text-sm text-pink-600">
    <span id="progress">0</span>/<span id="total">0</span>
  </p>
</div>

<div id="tasks" class="space-y-3 mb-6"></div>

<div class="mb-6">
  <h3 class="text-sm font-semibold text-gray-500 mb-2">Seu tempo</h3>
  <canvas id="chart"></canvas>
</div>

<div>
  <h3 class="text-sm font-semibold text-gray-500 mb-2">Seu mês</h3>
  <div id="calendar" class="grid grid-cols-7 gap-1 text-xs text-center"></div>
</div>

</div>

<script>
let tasksList = [
  {name:"Devocional", icon:"📖"},
  {name:"Inglês", icon:"📚"},
  {name:"Yoga", icon:"🧘‍♀️"},
  {name:"Jump", icon:"🏃‍♀️"}
];

// 🔥 limpa dados antigos bugados automaticamente
let rawData = JSON.parse(localStorage.getItem("habits")) || {};
let data = {};

// normaliza dados
Object.keys(rawData).forEach(day=>{
  data[day] = {};
  Object.keys(rawData[day]).forEach(task=>{
    if(typeof rawData[day][task] === "number"){
      data[day][task] = rawData[day][task];
    }
  });
});

function todayKey(){
  return new Date().toISOString().slice(0,10);
}

function formatDate(){
  return new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'short'});
}

function render(){
  document.getElementById("date").innerText = formatDate();

  const container = document.getElementById("tasks");
  container.innerHTML="";

  const today = todayKey();
  let doneCount=0;
  let totalTime=0;

  tasksList.forEach(task=>{
    const selectedTime = data[today]?.[task.name];

    if(selectedTime){
      doneCount++;
      totalTime += selectedTime;
    }

    const div=document.createElement("div");
    div.className="p-4 rounded-2xl shadow bg-white";

    div.innerHTML=`
      <div class="flex justify-between items-center">
        <span>${task.icon} ${task.name}</span>

        <button onclick="toggle('${task.name}', ${selectedTime || 30})"
          class="w-10 h-10 rounded-full ${selectedTime?'bg-pink-500 text-white':'bg-gray-200'}">
          ${selectedTime?'✔':''}
        </button>
      </div>

      <div class="flex gap-2 mt-3">
        <button onclick="toggle('${task.name}',10)"
          class="flex-1 rounded-full py-1 ${selectedTime==10?'bg-pink-200':'bg-gray-100'}">
          10 min
        </button>

        <button onclick="toggle('${task.name}',15)"
          class="flex-1 rounded-full py-1 ${selectedTime==15?'bg-pink-200':'bg-gray-100'}">
          15 min
        </button>

        <button onclick="toggle('${task.name}',30)"
          class="flex-1 rounded-full py-1 ${selectedTime==30?'bg-pink-200':'bg-gray-100'}">
          30 min
        </button>
      </div>
    `;

    container.appendChild(div);
  });

  document.getElementById("progress").innerText=doneCount;
  document.getElementById("total").innerText=tasksList.length;

  renderChart();
  renderCalendar();
}

function toggle(task, minutes){
  const today = todayKey();
  if(!data[today]) data[today] = {};

  if(data[today][task] === minutes){
    delete data[today][task];
  } else {
    data[today][task] = minutes;
  }

  save();
}

function save(){
  localStorage.setItem("habits", JSON.stringify(data));
  render();
}

function getTotalTime(){
  let total=0;
  Object.values(data).forEach(day=>{
    Object.values(day).forEach(time=> total+=time);
  });
  return total;
}

let chart;

function renderChart(){
  const ctx=document.getElementById("chart");

  const total=getTotalTime();

  if(chart) chart.destroy();

  chart=new Chart(ctx,{
    type:"bar",
    data:{
      labels:["Total"],
      datasets:[{
        label:"Minutos",
        data:[total]
      }]
    }
  });
}

function renderCalendar(){
  const calendar=document.getElementById("calendar");
  calendar.innerHTML="";

  const now=new Date();
  const year=now.getFullYear();
  const month=now.getMonth();

  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();

  for(let i=0;i<firstDay;i++){
    calendar.innerHTML += `<div></div>`;
  }

  for(let day=1;day<=daysInMonth;day++){
    calendar.innerHTML += `<div class="p-2 rounded bg-gray-100">${day}</div>`;
  }
}

render();
</script>

</body>
</html>
