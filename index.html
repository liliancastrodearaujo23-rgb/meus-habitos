<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rotina da Lili</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family: 'Inter', sans-serif;
}

.title{
  font-family: 'Playfair Display', serif;
}

/* 🎉 CONFETE */
.confetti{
  position: fixed;
  width: 8px;
  height: 8px;
  background: pink;
  top: -10px;
  animation: fall 1.5s linear forwards;
  z-index: 999;
}

@keyframes fall{
  to{
    transform: translateY(100vh) rotate(360deg);
    opacity: 0;
  }
}
</style>
</head>

<body class="bg-gradient-to-br from-gray-100 via-gray-200 to-gray-100 min-h-screen p-3 pb-24">

<div id="homeScreen" class="bg-white w-full max-w-md mx-auto rounded-[30px] shadow-xl p-5">

<div class="text-center mb-4">
  <p id="date" class="text-sm text-gray-400"></p>

  <h1 class="title text-3xl text-gray-800">
    Rotina da Lili 🌷
  </h1>

  <div id="messageBox" class="mt-3 p-3 rounded-2xl text-sm font-medium">
    <span id="message">Que hábito você vai praticar hoje?</span>
  </div>

  <p class="mt-2 text-sm text-gray-600">
    <span id="progress">0</span>/<span id="total">0</span>
  </p>

  <div class="mt-3">
    <div class="w-full bg-gray-200 rounded-full h-3 overflow-hidden">
      <div id="progressBar" class="h-3 rounded-full transition-all duration-500"></div>
    </div>
    <p id="progressText" class="text-xs text-gray-400 mt-1 text-center"></p>
  </div>
</div>

<div id="tasks" class="space-y-3 mb-6"></div>

</div>

<!-- MENU CLEAN -->
<div class="fixed bottom-0 left-0 w-full bg-white border-t flex justify-around py-3">

  <button onclick="showScreen('home')" class="text-sm text-gray-700 font-medium">
    Início
  </button>

  <button onclick="showScreen('charts')" class="text-sm text-gray-400">
    Gráficos
  </button>

</div>

<script>
let tasksList = [
  {name:"Devocional", icon:"📖", type:"time"},
  {name:"Inglês", icon:"📚", type:"time"},
  {name:"Yoga", icon:"🧘‍♀️", type:"time"},
  {name:"Jump", icon:"🏃‍♀️", type:"time"},
  {name:"Sem doce", icon:"🍫", type:"check"},
  {name:"Sem gastos", icon:"💸", type:"check"}
];

let data = JSON.parse(localStorage.getItem("habits")) || {};
let selectedDate = new Date().toISOString().slice(0,10);

// 🎯 RENDER
function render(){
  const container = document.getElementById("tasks");
  container.innerHTML="";

  let doneCount=0;

  tasksList.forEach(task=>{
    const entry = data[selectedDate]?.[task.name];
    const isDone = task.type==="check" ? entry === true : entry?.done;

    if(isDone) doneCount++;

    const div=document.createElement("div");
    div.className="p-4 rounded-3xl shadow-sm bg-gray-50";

    div.innerHTML=`
      <div class="flex justify-between items-center">
        <span>${task.icon} ${task.name}</span>
        <button onclick="toggleTask('${task.name}','${task.type}')"
          class="w-10 h-10 rounded-full ${isDone?'bg-gray-800 text-white':'bg-gray-200'}">
          ${isDone?'✔':''}
        </button>
      </div>
    `;

    container.appendChild(div);
  });

  document.getElementById("progress").innerText=doneCount;
  document.getElementById("total").innerText=tasksList.length;

  updateProgress(doneCount);
  updateMessage(doneCount);
}

// 📊 PROGRESSO COM %
function updateProgress(done){
  const total = tasksList.length;
  const percent = Math.round((done/total)*100);

  const bar = document.getElementById("progressBar");
  const text = document.getElementById("progressText");

  bar.style.width = percent+"%";
  text.innerText = percent+"% concluído";

  if(percent === 100){
    bar.className="h-3 rounded-full bg-green-400";
  }
  else if(percent >= 50){
    bar.className="h-3 rounded-full bg-blue-400";
  }
  else if(percent > 0){
    bar.className="h-3 rounded-full bg-yellow-400";
  }
  else{
    bar.className="h-3 rounded-full bg-pink-400";
  }
}

// 💬 FRASES + CORES
function updateMessage(count){
  const box = document.getElementById("messageBox");
  const text = document.getElementById("message");
  const total = tasksList.length;

  if(count === 0){
    text.innerText="Que hábito você vai praticar hoje?";
    box.className="mt-3 p-3 rounded-2xl bg-pink-50 text-pink-600";
  }
  else if(count === 1){
    text.innerText="Já é um bom começo!";
    box.className="mt-3 p-3 rounded-2xl bg-yellow-50 text-yellow-600";
  }
  else if(count >= 3 && count < total){
    text.innerText="Você está indo muito bem!";
    box.className="mt-3 p-3 rounded-2xl bg-blue-50 text-blue-600";
    launchConfetti();
  }
  else if(count === total){
    text.innerText="Perfeito, você completou tudo hoje!";
    box.className="mt-3 p-3 rounded-2xl bg-green-50 text-green-600";
    launchConfetti(true);
  }
}

// 🎉 CONFETE
function launchConfetti(big=false){
  const amount = big ? 80 : 40;

  for(let i=0;i<amount;i++){
    const conf = document.createElement("div");
    conf.className="confetti";
    conf.style.left=Math.random()*100+"vw";
    conf.style.backgroundColor = ["#f472b6","#60a5fa","#34d399","#facc15"][Math.floor(Math.random()*4)];
    conf.style.animationDuration = (Math.random()+1)+"s";

    document.body.appendChild(conf);

    setTimeout(()=>conf.remove(),1500);
  }
}

// 🔁 TOGGLE
function toggleTask(task,type){
  if(!data[selectedDate]) data[selectedDate]={};

  if(type==="check"){
    data[selectedDate][task] = !data[selectedDate][task];
  }else{
    if(!data[selectedDate][task]) data[selectedDate][task]={};
    data[selectedDate][task].done = !data[selectedDate][task].done;
  }

  localStorage.setItem("habits", JSON.stringify(data));
  render();
}

render();
</script>

</body>
</html>
