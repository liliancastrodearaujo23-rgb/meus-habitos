<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rotina da Lili</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
.fade-in {
  animation: fadeIn 0.4s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body class="bg-gradient-to-br from-pink-100 via-rose-100 to-pink-200 min-h-screen p-3">

<div class="bg-white w-full max-w-md mx-auto rounded-3xl shadow-xl p-5">

<div class="text-center mb-4">
  <p id="date" class="text-sm text-gray-400"></p>
  <h1 class="text-3xl text-pink-500">Rotina da Lili 🌷</h1>

  <div id="messageBox" class="mt-2 p-3 rounded-2xl bg-pink-50 text-pink-600 text-sm font-medium">
    <span id="message">Que hábito você vai praticar hoje?</span>
  </div>

  <p class="mt-2 text-sm text-pink-600">
    <span id="progress">0</span>/<span id="total">0</span>
  </p>

  <div class="mt-3">
    <div class="w-full bg-gray-200 rounded-full h-3 overflow-hidden">
      <div id="progressBar" class="h-3 rounded-full transition-all duration-500 bg-pink-400" style="width:0%"></div>
    </div>
    <p id="progressText" class="text-xs text-gray-400 mt-1 text-center"></p>
  </div>
</div>

<div id="tasks" class="space-y-3 mb-6"></div>

<!-- BOTÃO SALVAR -->
<button onclick="saveDay()" 
  class="w-full mb-4 py-2 rounded-xl bg-pink-500 text-white text-sm">
  Salvar dia 💾
</button>

<div class="mb-6 p-4 bg-gray-50 rounded-2xl text-center">
  <h3 class="text-sm font-semibold text-gray-500 mb-2">Seu tempo total</h3>
  <p id="timeSummary" class="text-sm text-gray-600"></p>
</div>

<div>
  <h3 class="text-sm font-semibold text-gray-500 mb-2">Seu mês</h3>
  <div id="calendar" class="grid grid-cols-7 gap-1 text-xs text-center mb-6"></div>
</div>

<div class="mb-4">
  <div class="flex justify-between items-center mb-2">
    <h3 class="text-sm font-semibold text-gray-500">Onde você mais investiu tempo</h3>
    <button onclick="toggleView()" class="text-xs text-pink-500">
      Alternar semana/mês
    </button>
  </div>
  <canvas id="habitChart"></canvas>
</div>

</div>

<script>
let tasksList = [
  {name:"Devocional", icon:"📖", type:"time"},
  {name:"Inglês", icon:"📚", type:"time"},
  {name:"Yoga", icon:"🧘‍♀️", type:"time"},
  {name:"Jump", icon:"🏃‍♀️", type:"time"},
  {name:"Sem doce", icon:"🍫", type:"check"},
  {name:"Sem gastos", icon:"💸", type:"check"}
];

let data = JSON.parse(localStorage.getItem("habits")) || {};
let chart;
let viewMode = "week";
let selectedDate = todayKey();

function todayKey(){
  return new Date().toISOString().slice(0,10);
}

function formatDate(){
  return new Date(selectedDate).toLocaleDateString('pt-BR',{
    weekday:'long',
    day:'numeric',
    month:'short'
  });
}

function render(){
  document.getElementById("date").innerText = formatDate();

  const container = document.getElementById("tasks");
  container.innerHTML="";

  const today = selectedDate;
  let doneCount=0;

  tasksList.forEach(task=>{
    const entry = data[today]?.[task.name];

    const isDone = task.type==="check"
      ? entry === true
      : entry?.done;

    if(isDone) doneCount++;

    const div=document.createElement("div");
    div.className="p-4 rounded-2xl shadow bg-white";

    if(task.type==="time"){
      const selectedTime = entry?.time;

      div.innerHTML=`
        <div class="flex justify-between items-center">
          <span>${task.icon} ${task.name}</span>
          <button onclick="toggleCheck('${task.name}')"
            class="w-10 h-10 rounded-full ${isDone?'bg-pink-500 text-white':'bg-gray-200'}">
            ${isDone?'✔':''}
          </button>
        </div>

        <div class="flex gap-2 mt-3">
          ${[10,15,30].map(t=>`
            <button onclick="selectTime('${task.name}',${t})"
              class="flex-1 rounded-full py-1 ${selectedTime==t?'bg-pink-200':'bg-gray-100'}">
              ${t} min
            </button>
          `).join("")}
        </div>
      `;
    }

    if(task.type==="check"){
      div.innerHTML=`
        <div class="flex justify-between items-center">
          <span>${task.icon} ${task.name}</span>
          <button onclick="toggleSimple('${task.name}')"
            class="w-10 h-10 rounded-full ${isDone?'bg-pink-500 text-white':'bg-gray-200'}">
            ${isDone?'✔':''}
          </button>
        </div>
      `;
    }

    container.appendChild(div);
  });

  document.getElementById("progress").innerText=doneCount;
  document.getElementById("total").innerText=tasksList.length;

  updateProgressBar(doneCount, tasksList.length);
  updateMessage(doneCount);
  updateSummary();
  renderCalendar();
  renderChart();
}

function saveDay(){
  localStorage.setItem("habits", JSON.stringify(data));
  alert("Dia salvo com sucesso 💾");
}

// -------- AÇÕES --------
function selectTime(task, minutes){
  const today = selectedDate;
  if(!data[today]) data[today]={};

  const current = data[today][task];

  if(current?.time === minutes){
    delete data[today][task].time;
    if(!data[today][task].done){
      delete data[today][task];
    }
  } else {
    if(!data[today][task]) data[today][task]={};
    data[today][task].time = minutes;
  }

  render();
}

function toggleCheck(task){
  const today = selectedDate;
  if(!data[today]) data[today]={};

  const current = data[today][task];

  if(current?.done){
    current.done = false;
    if(!current.time){
      delete data[today][task];
    }
  } else {
    if(!data[today][task]) data[today][task]={};
    data[today][task].done = true;
  }

  render();
}

function toggleSimple(task){
  const today = selectedDate;
  if(!data[today]) data[today]={};

  data[today][task] = !data[today][task];
  render();
}

// -------- CALENDÁRIO --------
function renderCalendar(){
  const calendar=document.getElementById("calendar");
  calendar.innerHTML="";

  const now=new Date();
  const year=now.getFullYear();
  const month=now.getMonth();

  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();

  for(let i=0;i<firstDay;i++){
    calendar.innerHTML+=`<div></div>`;
  }

  for(let day=1;day<=daysInMonth;day++){
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const isSelected = dateStr === selectedDate;

    calendar.innerHTML+=`
      <div onclick="selectDay('${dateStr}')"
        class="p-2 rounded cursor-pointer 
        ${isSelected ? 'bg-pink-400 text-white' : 'bg-gray-100'}">
        ${day}
      </div>
    `;
  }
}

function selectDay(date){
  selectedDate = date;
  render();
}

// -------- RESTO --------
function updateSummary(){
  let total=0;
  Object.values(data).forEach(day=>{
    Object.values(day).forEach(task=>{
      if(task?.time) total+=task.time;
    });
  });
  document.getElementById("timeSummary").innerText = total+" minutos investidos";
}

function updateProgressBar(done,total){
  const percent = Math.round((done/total)*100);
  const bar = document.getElementById("progressBar");
  const text = document.getElementById("progressText");

  bar.style.width = percent + "%";
  text.innerText = percent + "% concluído";
}

function updateMessage(count){
  const text = document.getElementById("message");
  const total = tasksList.length;

  if(count === total){
    text.innerText = "Perfeito, Lili! Você cumpriu tudo hoje 🧚‍♀️✨";
  }
  else if(count >= 3){
    text.innerText = "Você está indo muito bem 🔥";
  }
  else if(count >= 1){
    text.innerText = "Já é um bom começo 💫";
  }
  else{
    text.innerText = "Que hábito você vai praticar hoje?";
  }
}

function renderChart(){
  const ctx=document.getElementById("habitChart");

  let totals={};
  tasksList.forEach(t=>{ if(t.type==="time") totals[t.name]=0 });

  const now = new Date();

  Object.entries(data).forEach(([date,day])=>{
    const d = new Date(date);
    const diffDays = Math.floor((now - d) / (1000*60*60*24));

    if(
      (viewMode === "week" && diffDays <= 7) ||
      (viewMode === "month" && d.getMonth() === now.getMonth())
    ){
      Object.entries(day).forEach(([task,value])=>{
        if(value?.time){
          totals[task]+=value.time;
        }
      });
    }
  });

  if(chart) chart.destroy();

  chart=new Chart(ctx,{
    type:"bar",
    data:{
      labels:Object.keys(totals),
      datasets:[{
        label:"Minutos",
        data:Object.values(totals)
      }]
    }
  });
}

function toggleView(){
  viewMode = viewMode === "week" ? "month" : "week";
  renderChart();
}

render();
</script>

</body>
</html>
